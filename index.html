<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Birthday Card ✨</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="card-container" id="mainCard">
        
        <div id="step1" class="fade-in">
            <div class="envelope" onclick="nextStep(2)">📧</div>
            <h3 style="margin-top: 25px;">Ada pesan untukmu!</h3>
            <p>Seseorang mengirimkan sesuatu</p>
            <button onclick="nextStep(2)">Buka Pesan</button>
        </div>

        <div id="step2" class="hidden">
            <img src="https://i.pinimg.com/originals/30/a9/f1/30a9f170643a4f136b4101bcb8cdafca.gif" alt="Thinking GIF" class="step-gif">
            <h3>Tahun Lahir Kamu? 🤔</h3>
            <input type="range" id="yearRange" min="1995" max="2026" value="2009" oninput="updateYear(this.value)">
            <div class="year-val" id="yearDisplay">2009</div>
            <button onclick="nextStep(3)">Lanjutkan</button>
        </div>

        <div id="step3" class="hidden">
            <h3>Memory Game 🎮</h3>
            <p>Cocokkan semua kartu ya! 😊</p>
            <div class="memory-grid" id="memoryGrid"></div>
        </div>

        <div id="step4" class="hidden">
            <h2 id="finalTitle">Happy Birthday! 🎂</h2>
            <div class="scroll-container" id="scrollContainer">
                <p id="typewriterLong"></p>
            </div>
            <button id="btnContinue" class="hidden" onclick="nextStep(5)">Lanjutkan ✨</button>
        </div>

        <div id="step5" class="hidden">
            <div id="storyContent">
                <img src="https://i.pinimg.com/originals/55/06/89/550689d98472b901c6f6aad5ed20d625.gif" alt="Celebration GIF" class="step-gif story-gif">
                <div class="heart-icon" id="storyEmoji">💖</div>
                <h2 id="storyTitle"></h2>
                <p id="typewriterStory"></p>
            </div>
            <button id="btnReset" class="hidden" onclick="resetGame()">Mulai dari Awal 🔄</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
